name = "rdp-relay"
main = "worker.js"
compatibility_date = "2024-01-01"

# Переменные среды (можно задать здесь или в dashboard)
[vars]
BACKEND_HOST   = "YOUR_VPS_IP"
BACKEND_PORT   = "443"
BACKEND_TLS    = "true"
WORKER_SECRET  = "ЗАМЕНИ_НА_СЛУЧАЙНУЮ_СТРОКУ_32_СИМВОЛА"

# Бесплатный план: 100k запросов/день
# Для продакшн без лимитов: Workers Paid ($5/мес)
